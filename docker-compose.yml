# ============================================================
# Docker Compose - CoolService
# Sistema de Gestión de Mantenimiento de Neveras
# ============================================================

version: '3.9'

services:
  # ──────────────────────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: coolservice-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-neveras123}
      MYSQL_DATABASE: ${DB_DATABASE:-neveras_db}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/procedures.sql:/docker-entrypoint-initdb.d/02-procedures.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    networks:
      - coolservice-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-neveras123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # NestJS Backend
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coolservice-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-neveras123}
      DB_DATABASE: ${DB_DATABASE:-neveras_db}
      APP_PORT: 3002
      CRON_VERIFICAR_PLAZOS: ${CRON_VERIFICAR_PLAZOS:-0 8 * * *}
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - coolservice-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/reportes/resumen", "||", "exit", "1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────
  # React Frontend
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coolservice-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - coolservice-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ──────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: coolservice-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - coolservice-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ──────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  coolservice-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
